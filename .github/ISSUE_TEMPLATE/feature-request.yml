name: Feature request
description: Suggest a new capability or an improvement to an existing one.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do, and what's getting in the way today?
      placeholder: "When I stream to Twitch + Kick + YouTube at the same time, I can't tell at a glance which one just had a new follower because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: If you have a specific idea, describe it. Rough sketches are fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways to solve the same problem, or existing tools that handle it differently.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have — I'd use it occasionally
        - Meaningful — it would noticeably improve my workflow
        - Critical — the current workflow is painful enough that I'm considering switching tools
